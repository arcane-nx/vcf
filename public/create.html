<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Session — Emmy Henz VCF</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255,255,255,0.04);
            --glass-border: rgba(255,255,255,0.1);
            --bg: #050914;
            --text: #f0f4ff;
            --muted: rgba(200,210,255,0.5);
            --input-bg: rgba(255,255,255,0.04);
            --input-border: rgba(255,255,255,0.08);
            --rose: #f472b6;
            --cyan: #22d3ee;
            --violet: #a78bfa;
            --green: #10b981;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
            overflow-x: hidden;
        }

        .aurora {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
        }
        .aurora::before {
            content: '';
            position: absolute;
            top: -15%; left: -15%;
            width: 60%; height: 60%;
            background: radial-gradient(ellipse, rgba(167,139,250,0.15) 0%, transparent 70%);
            animation: d1 13s ease-in-out infinite alternate;
        }
        .aurora::after {
            content: '';
            position: absolute;
            bottom: -15%; right: -10%;
            width: 55%; height: 55%;
            background: radial-gradient(ellipse, rgba(244,114,182,0.12) 0%, transparent 70%);
            animation: d2 11s ease-in-out infinite alternate;
        }
        @keyframes d1 { to { transform: translate(6%,10%) scale(1.1); } }
        @keyframes d2 { to { transform: translate(-5%,-8%) scale(1.08); } }

        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 540px;
            background: var(--glass);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 48px 44px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03) inset;
            animation: card-in 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 12%; right: 12%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
        }
        @keyframes card-in {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: none; }
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.82rem;
            margin-bottom: 28px;
            transition: color 0.2s;
            letter-spacing: 0.03em;
        }
        .back-link:hover { color: var(--text); }

        .header { text-align: center; margin-bottom: 36px; }
        .header-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(167,139,250,0.25), rgba(244,114,182,0.25));
            border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin: 0 auto 18px;
            box-shadow: 0 8px 24px rgba(167,139,250,0.15);
        }
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; font-weight: 900;
            background: linear-gradient(135deg, #fff 30%, var(--violet) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle {
            color: var(--muted); font-size: 0.88rem; margin-top: 8px; font-weight: 300;
        }

        /* Form groups */
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            font-size: 0.95rem;
            opacity: 0.4;
            pointer-events: none;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 13px 14px 13px 40px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
        }
        input[type="text"]:focus,
        input[type="number"]:focus {
            border-color: rgba(167,139,250,0.5);
            background: rgba(167,139,250,0.06);
            box-shadow: 0 0 0 3px rgba(167,139,250,0.1);
        }
        input::placeholder { color: rgba(200,210,255,0.2); }

        .section-label {
            font-size: 0.78rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
            margin-bottom: 12px;
        }

        .duration-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .duration-item { text-align: center; }
        .duration-item label {
            display: block;
            font-size: 0.72rem;
            color: rgba(200,210,255,0.35);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .duration-item input {
            padding: 12px 8px !important;
            text-align: center;
            font-size: 1.2rem !important;
            font-weight: 600 !important;
            padding-left: 8px !important;
        }

        /* Divider between units */
        .duration-sep {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 18px;
            color: rgba(255,255,255,0.15);
            font-size: 1.2rem;
            font-weight: 300;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            margin-top: 28px;
            background: linear-gradient(135deg, rgba(16,185,129,0.4), rgba(5,150,105,0.5));
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 14px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(16,185,129,0.15);
        }
        .submit-btn::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(16,185,129,0.6), rgba(5,150,105,0.7));
            opacity: 0; transition: opacity 0.3s;
        }
        .submit-btn:hover::before { opacity: 1; }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(16,185,129,0.3);
        }
        .submit-btn span { position: relative; z-index: 1; }

        #errorMsg {
            margin-top: 16px;
            padding: 12px 16px;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 10px;
            color: #fca5a5;
            font-size: 0.88rem;
            text-align: center;
            display: none;
        }

        /* Success block */
        #successBlock {
            display: none;
            animation: card-in 0.5s ease both;
        }
        .success-icon {
            width: 64px; height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(5,150,105,0.3));
            border: 1px solid rgba(16,185,129,0.3);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(16,185,129,0.2);
        }
        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            text-align: center;
            color: var(--green);
            margin-bottom: 8px;
        }
        .success-sub {
            text-align: center;
            color: var(--muted);
            font-size: 0.88rem;
            margin-bottom: 24px;
        }
        .link-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }
        .link-row input {
            flex: 1;
            padding: 12px 14px !important;
            padding-left: 14px !important;
            background: rgba(255,255,255,0.04) !important;
            color: var(--cyan) !important;
            font-size: 0.82rem !important;
            border-radius: 10px !important;
        }
        .copy-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, rgba(34,211,238,0.25), rgba(14,165,233,0.3));
            border: 1px solid rgba(34,211,238,0.3);
            border-radius: 10px;
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .copy-btn:hover {
            background: linear-gradient(135deg, rgba(34,211,238,0.4), rgba(14,165,233,0.5));
            transform: scale(1.03);
        }
        .goto-btn {
            display: block;
            text-align: center;
            padding: 12px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.88rem;
            transition: all 0.3s;
        }
        .goto-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            body { padding: 16px; }
            .card { padding: 36px 20px; border-radius: 24px; }
            h2 { font-size: 1.7rem; }
            .duration-grid { gap: 6px; }
            .duration-item label { font-size: 0.65rem; }
            .duration-item input { font-size: 1.1rem !important; padding: 10px 4px !important; }
            .submit-btn { padding: 13px; font-size: 0.95rem; }
            .copy-btn { padding: 12px 14px; font-size: 0.82rem; }
        }
    </style>
</head>
<body>
    <div class="aurora"></div>

    <div class="card">
        <a href="/" class="back-link">← Back to home</a>

        <div class="header">
            <div class="header-icon">✦</div>
            <h2>Create a Session</h2>
            <p class="subtitle">Set up your time-locked contact collection</p>
        </div>

        <form id="createForm">
            <div class="form-group">
                <label>Session Name</label>
                <div class="input-wrap">
                    <span class="input-icon">✎</span>
                    <input type="text" id="name" required placeholder="e.g., Emmy's Birthday Bash">
                </div>
            </div>

            <div class="form-group">
                <label>Redirect Link <span style="opacity:0.4;font-size:0.85em;">(Optional)</span></label>
                <div class="input-wrap">
                    <span class="input-icon">🔗</span>
                    <input type="text" id="link" placeholder="e.g., https://wa.me/yourlink">
                </div>
            </div>

            <div class="form-group">
                <p class="section-label">Duration Before Unlock</p>
                <div class="duration-grid">
                    <div class="duration-item">
                        <label>Days</label>
                        <div class="input-wrap">
                            <input type="number" id="days" value="0" min="0">
                        </div>
                    </div>
                    <div class="duration-item">
                        <label>Hours</label>
                        <div class="input-wrap">
                            <input type="number" id="hours" value="0" min="0" max="23">
                        </div>
                    </div>
                    <div class="duration-item">
                        <label>Mins</label>
                        <div class="input-wrap">
                            <input type="number" id="minutes" value="0" min="0" max="59">
                        </div>
                    </div>
                    <div class="duration-item">
                        <label>Secs</label>
                        <div class="input-wrap">
                            <input type="number" id="seconds" value="0" min="0" max="59">
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn"><span>✦ Create Session</span></button>
            <div id="errorMsg"></div>
        </form>

        <div id="successBlock">
            <div class="success-icon">✓</div>
            <h3 class="success-title">Session Created!</h3>
            <p class="success-sub">Share this link so people can drop their contacts</p>
            <div class="link-row">
                <input type="text" id="sessionLinkInput" readonly>
                <button class="copy-btn" id="copyBtn">Copy</button>
            </div>
            <a href="#" id="goToSessionBtn" class="goto-btn">Go to Session Page →</a>
        </div>
    </div>

    <script>
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const link = document.getElementById('link').value;
            const days = document.getElementById('days').value || 0;
            const hours = document.getElementById('hours').value || 0;
            const minutes = document.getElementById('minutes').value || 0;
            const seconds = document.getElementById('seconds').value || 0;
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.style.display = 'none';

            if (+days === 0 && +hours === 0 && +minutes === 0 && +seconds === 0) {
                errorMsg.textContent = 'Please set a duration greater than zero.';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const response = await fetch('/api/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, link, days, hours, minutes, seconds })
                });

                if (response.ok) {
                    const data = await response.json();
                    const fullUrl = window.location.origin + '/session/' + data.sessionId;

                    document.getElementById('createForm').style.display = 'none';
                    const successBlock = document.getElementById('successBlock');
                    successBlock.style.display = 'block';

                    const linkInput = document.getElementById('sessionLinkInput');
                    linkInput.value = fullUrl;
                    document.getElementById('goToSessionBtn').href = '/session/' + data.sessionId;

                    document.getElementById('copyBtn').addEventListener('click', () => {
                        navigator.clipboard.writeText(fullUrl).catch(() => {
                            linkInput.select();
                            document.execCommand('copy');
                        });
                        const btn = document.getElementById('copyBtn');
                        btn.textContent = '✓ Copied!';
                        setTimeout(() => btn.textContent = 'Copy', 2000);
                    });
                } else {
                    throw new Error('Failed');
                }
            } catch {
                errorMsg.textContent = 'Something went wrong. Please try again.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
